services:
  # Backend Service
  - type: web
    name: api-gateway-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WEATHER_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend Service
  - type: web
    name: api-gateway-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api-gateway-backend.onrender.com